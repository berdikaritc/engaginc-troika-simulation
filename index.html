<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anak Bos Troika — Simulation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game" aria-label="Anak Bos Troika game simulation">
      <header class="topbar">
        <div class="brand"><span class="eyebrow">ANAK BOS</span><span>TROIKA</span></div>
        <div id="turn-info" class="turn-info">READY</div>
        <div id="speed-badge" class="speed-badge">SPEED 5</div>
      </header>

      <section class="player-zone player-one">
        <div class="player-label"><span class="dot"></span><span>PLAYER 1</span></div>
        <div id="p1-pile" class="hand-pile" data-pile="P1"></div>
      </section>

      <section class="table-zone">
        <div id="draw-origin" class="draw-origin" aria-hidden="true"><span>DRAW</span></div>
        <div class="discard-area">
          <div class="pile-caption">DISCARD PILE</div>
          <div id="discard-pile" class="discard-pile" data-pile="DISCARD"></div>
        </div>
        <div id="call-banner" class="call-banner" aria-live="polite"></div>
      </section>

      <section class="player-zone player-two">
        <div id="p2-pile" class="hand-pile" data-pile="P2"></div>
        <div class="player-label"><span class="dot"></span><span>PLAYER 2</span></div>
      </section>

      <div id="move-layer" aria-hidden="true"></div>
    </main>
    <script src="simulation.js"></script>
  </body>
</html>
