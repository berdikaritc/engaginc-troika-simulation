<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anak Bos Troika - Simulation Animation</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Wrapper containing Controls Sidebar and 720x1080 Board -->
  <div class="app-wrapper">
    
    <!-- Sidebar Control Panel (Press 'H' to toggle) -->
    <aside class="control-panel" id="control-panel">
      <div class="panel-header">
        <h2>TROIKA CONTROL</h2>
        <p class="shortcut-tip">Press <kbd>H</kbd> to hide panel for recording</p>
      </div>

      <div class="panel-group">
        <label for="sim-selector">Simulation Folder:</label>
        <div class="input-row">
          <input type="text" id="sim-selector" value="S1" placeholder="e.g. S1, S2">
          <button id="load-sim-btn">Load</button>
        </div>
      </div>

      <div class="panel-group">
        <label>Playback Control:</label>
        <div class="button-row">
          <button id="play-pause-btn" class="primary-btn">Start</button>
          <button id="step-prev-btn" title="Previous Step">◀</button>
          <button id="step-next-btn" title="Next Step">▶</button>
          <button id="restart-btn" title="Restart Simulation">↺</button>
        </div>
      </div>

      <div class="panel-group">
        <label for="speed-slider">Speed: <span id="speed-val">1.0</span>x</label>
        <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1">
      </div>

      <div class="panel-group steps-list-group">
        <label>Simulation Steps:</label>
        <div class="steps-list" id="steps-list">
          <!-- Populated by JS -->
          <div class="empty-list-msg">No simulation loaded</div>
        </div>
      </div>

      <div class="panel-footer">
        <button id="hide-btn" class="text-btn">Hide Controls Panel</button>
      </div>
    </aside>

    <!-- The 720x1080 Board (Exactly recorded area) -->
    <main class="game-board" id="game-board">
      
      <!-- Top Logo + Info Area -->
      <header class="top-bar">
        <!-- Logo (Absolutely Positioned) -->
        <div class="logo-container">
          <img src="logo/logo.png" alt="Anak Bos Troika Logo" class="logo-img">
        </div>
        
        <!-- Info Display Dashboard (Center-Right) -->
        <div class="info-dashboard">
          <div class="info-row">
            <span class="info-label">TURN</span>
            <span class="info-value" id="turn-num">-</span>
            <span class="info-divider">|</span>
            <span class="info-label">STEP</span>
            <span class="info-value" id="step-num">-</span>
          </div>
          <div class="summary-row" id="step-summary">Loading...</div>
          
          <!-- Sleek progress bar -->
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
      </header>

      <!-- Section Dividers -->
      <div class="section-divider" id="divider-top-p1"></div>
      <div class="section-divider" id="divider-p1-discard"></div>
      <div class="section-divider" id="divider-discard-p2"></div>

      <!-- Section Labels (Right Side) -->
      <div class="section-label" id="label-p1">
        <span class="bullet p1-bullet">●</span> Player 1 Hand
      </div>
      <div class="section-label" id="label-discard">
        <span class="bullet discard-bullet">●</span> Discard Pile
      </div>
      <div class="section-label" id="label-p2">
        <span class="bullet p2-bullet">●</span> Player 2 Hand
      </div>

      <!-- Card container (All cards are spawned here and absolute-positioned relative to game-board) -->
      <div class="cards-layer" id="cards-layer">
        <!-- Cards injected by JS -->
      </div>

      <!-- Call Announcement Overlay -->
      <div class="call-overlay" id="call-overlay">
        <div class="call-card">
          <div class="call-speaker" id="call-speaker">PLAYER 1 CALLS</div>
          <div class="call-value" id="call-value">ROUND</div>
        </div>
      </div>

      <!-- Loading Screen Overlay -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="loader-content">
          <div class="loader-spinner"></div>
          <h2 class="loader-title">ANAK BOS TROIKA</h2>
          <p class="loader-text" id="loader-text">Loading simulation data...</p>
          <div class="loading-progress-container">
            <div class="loading-progress-bar" id="loading-progress-bar"></div>
          </div>
        </div>
      </div>

      <!-- Floating status badge -->
      <div class="status-badge" id="status-badge">READY</div>

      <!-- Show Controls trigger when hidden -->
      <button class="show-controls-trigger" id="show-controls-trigger" title="Show Controls (Press 'H')">
        ⚙ Controls
      </button>
    </main>

  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
