<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anak Bos Troika — Simulation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game" aria-label="Anak Bos Troika game simulation">
      <header>
        <span class="eyebrow">ANAK BOS</span>
        <h1>TROIKA</h1>
        <div id="turn-label">Ready</div>
      </header>

      <section class="player player-one">
        <div class="player-heading"><span>P1</span><small>PLAYER ONE</small></div>
        <div id="p1-hand" class="hand top-hand"></div>
      </section>

      <section class="table-area">
        <div id="event-summary" class="event-summary"></div>
        <div id="call-banner" class="call-banner" aria-live="polite"></div>
        <div class="discard-label">DISCARD</div>
        <div id="discard-pile" class="discard-pile"></div>
        <div class="draw-direction">DRAW →</div>
      </section>

      <section class="player player-two">
        <div id="p2-hand" class="hand bottom-hand"></div>
        <div class="player-heading right"><span>P2</span><small>PLAYER TWO</small></div>
      </section>
      <div id="animation-layer" aria-hidden="true"></div>
    </main>
    <script src="simulations.js"></script>
    <script src="app.js"></script>
  </body>
</html>
