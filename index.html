<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anak Bos Troika — Simulation</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-table" aria-label="Anak Bos Troika game simulation">
      <header class="game-header">
        <img class="logo" src="logo/logo.png" alt="Anak Bos Troika">
        <div class="turn-info">
          <span id="turn-label">Loading simulation…</span>
          <span id="step-summary"></span>
        </div>
      </header>

      <section class="zone hand-zone" aria-label="Player 1 hand">
        <div class="player-label">P1</div>
        <div class="pile hand-pile" id="p1-pile"></div>
      </section>

      <div class="clearance" aria-hidden="true"></div>

      <section class="zone discard-zone" aria-label="Discard pile">
        <div class="player-label">DISCARD</div>
        <div class="pile discard-pile" id="discard-pile"></div>
        <div class="call-overlay" id="call-overlay" aria-live="polite"></div>
      </section>

      <div class="clearance" aria-hidden="true"></div>

      <section class="zone hand-zone" aria-label="Player 2 hand">
        <div class="player-label">P2</div>
        <div class="pile hand-pile" id="p2-pile"></div>
      </section>
    </main>
    <div id="animation-layer" aria-hidden="true"></div>
    <script src="app.js"></script>
  </body>
</html>
