<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anak Bos Troika — Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" aria-live="polite">
    <header class="topbar">
      <img class="logo" src="logo/logo.png" alt="Anak Bos Troika">
      <div class="status">
        <span id="turnLabel">Preparing game</span>
        <span id="stepLabel">Please wait…</span>
      </div>
    </header>

    <section class="pile-zone player-zone" id="p1Zone">
      <h2>PLAYER 1 <small>HAND</small></h2>
      <div class="hand" id="p1" aria-label="Player 1 hand"></div>
    </section>

    <section class="pile-zone discard-zone" id="discardZone">
      <h2>DISCARD PILE <small id="discardCount">0 cards</small></h2>
      <div class="hand discard-hand" id="discard" aria-label="Discard pile"></div>
    </section>

    <section class="pile-zone player-zone" id="p2Zone">
      <h2>PLAYER 2 <small>HAND</small></h2>
      <div class="hand" id="p2" aria-label="Player 2 hand"></div>
    </section>

    <div id="drawPile" aria-label="Draw pile"><img src="cards-back/back.png" alt=""></div>
    <div id="callout" role="status"><span class="call-caption">CALL</span><strong></strong></div>
    <div id="finish">SIMULATION COMPLETE</div>
  </main>
  <script src="app.js"></script>
</body>
</html>
